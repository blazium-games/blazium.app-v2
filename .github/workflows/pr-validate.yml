name: Validate PR
on:
  pull_request:
    branches: [master]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run fetch-data
      - run: npm run build
      - run: npm run build:pages
        env:
          GITHUB_PAGES: "true"
